<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET THREE 店舗別 3日間天気予報一覧</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e2e8f0;
            --rain-bg: #fff5f5;
            --rain-text: #e53e3e;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 20px;
            color: #2d3748;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .refresh-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .search-box {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            max-width: 250px;
        }

        .weather-table-container {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 700px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        th {
            background-color: #edf2f7;
            font-weight: bold;
            color: #4a5568;
            font-size: 14px;
        }

        .store-info { width: 25%; }
        .day-column { width: 25%; }

        /* クリックできる店舗名に下線とカーソル風のデザインを適用 */
        .store-click-zone {
            cursor: pointer;
            display: inline-block;
        }
        .store-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: var(--primary-color);
            text-decoration: underline;
        }
        .store-title:hover {
            color: #2b6cb0;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            background-color: #718096;
        }

        .weather-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 8px;
        }

        .weather-card.is-rain {
            background-color: var(--rain-bg);
            border-color: #fed7d7;
        }

        .date-label {
            font-size: 11px;
            font-weight: bold;
            color: #718096;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 2px;
            margin-bottom: 4px;
        }

        .weather-text {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .is-rain .weather-text {
            color: var(--rain-text);
        }

        .weather-details {
            font-size: 12px;
            color: #4a5568;
            display: flex;
            justify-content: space-between;
        }

        .temp-high { color: #e53e3e; font-weight: bold; }
        .temp-low { color: #3182ce; font-weight: bold; }

        .loading {
            text-align: center;
            padding: 30px;
            color: #718096;
            font-size: 14px;
        }

        /* 🕒 ポップアップ（モーダル窓）のスタイル */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 15px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: #a0aec0;
        }
        .close-btn:hover { color: #4a5568; }

        .modal-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-right: 20px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }

        .hourly-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .hourly-table th, .hourly-table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .hourly-table th { background: #f7fafc; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌤️ PET THREE 天気一覧</h1>
        <button class="refresh-btn" onclick="fetchAllWeather()">更新</button>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="店舗名や地域で検索..." onkeyup="filterTable()">
    </div>

    <div class="weather-table-container">
        <table id="weatherTable">
            <thead>
                <tr>
                    <th class="store-info">店舗情報 (クリックで詳細)</th>
                    <th class="day-column">今日</th>
                    <th class="day-column">明日</th>
                    <th class="day-column">明後日</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- データ自動挿入 -->
            </tbody>
        </table>
    </div>
</div>

<!-- 🕒 ポップアップ表示用の隠し要素 -->
<div id="hourlyModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeModal()">⨉</button>
        <div id="modalTitle" class="modal-title">店舗名（時間帯天気）</div>
        <table class="hourly-table">
            <thead>
                <tr>
                    <th>時間</th>
                    <th>天気</th>
                    <th>気温</th>
                    <th>降水確率</th>
                </tr>
            </thead>
            <tbody id="hourlyTableBody">
                <!-- ここに時間ごとのデータが入る -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const stores = [
        { name: "PET THREE 酒々井プレミアム・アウトレット店", region: "千葉県 印旛", lat: 35.72, lon: 140.29 },
        { name: "PET THREE 三井アウトレットパーク木更津店", region: "千葉県 君津", lat: 35.44, lon: 139.93 },
        { name: "PET THREE あみプレミアム・アウトレット店", region: "茨城県 竜ヶ崎", lat: 35.98, lon: 140.22 },
        { name: "PET THREE 那須ガーデンアウトレット店", region: "栃木県 那須", lat: 36.93, lon: 140.02 },
        { name: "PET THREE 三井アウトレットパークマリンピア神戸店", region: "兵庫県 南部", lat: 34.63, lon: 135.05 },
        { name: "PET THREE 三井アウトレットパーク 岡崎店", region: "愛知県 西部", lat: 34.93, lon: 137.17 },
        { name: "PET THREE 三井アウトレットパーク北陸小矢部店", region: "富山県 西部", lat: 36.68, lon: 136.87 },
        { name: "PET THREE 仙台泉プレミアム･アウトレット店", region: "宮城県 東部", lat: 38.34, lon: 140.84 },
        { name: "PET THREE 三井アウトレットパーク 倉敷店", region: "岡山県 南部", lat: 34.60, lon: 133.76 },
        { name: "PET THREE 三井アウトレットパーク入間店", region: "埼玉県 西部", lat: 35.84, lon: 139.38 },
        { name: "PET THREE ジャズドリーム長島店", region: "三重県 北部", lat: 35.03, lon: 136.73 },
        { name: "PET THREE 三井アウトレットパーク滋賀竜王店", region: "滋賀県 南部", lat: 35.07, lon: 136.10 },
        { name: "PET THREE THE OUTLETS KITAKYUSHU店", region: "福岡県 北九州", lat: 33.87, lon: 130.81 }
    ];

    const getWeatherText = (code) => {
        if ([0].includes(code)) return "晴れ";
        if ([1, 2, 3].includes(code)) return "晴れ/曇";
        if ([45, 48].includes(code)) return "霧";
        if ([51, 53, 55, 56, 57].includes(code)) return "小雨";
        if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return "雨";
        if ([71, 73, 75, 77, 85, 86].includes(code)) return "雪";
        if ([95, 96, 99].includes(code)) return "雷雨";
        return "曇り";
    };

    // 3日間の概要データを取得
    async function fetch3DayWeather(lat, lon) {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo`;
            const response = await fetch(url);
            const data = await response.json();
            const daily = data.daily;
            const result = [];

            for(let i = 0; i < 3; i++) {
                let dateRaw = new Date(daily.time[i]);
                let dateStr = `${dateRaw.getMonth() + 1}/${dateRaw.getDate()}`;
                result.push({
                    date: dateStr,
                    weather: getWeatherText(daily.weathercode[i]),
                    max: Math.round(daily.temperature_2m_max[i]),
                    min: Math.round(daily.temperature_2m_min[i]),
                    pop: daily.precipitation_probability_max[i] + "%"
                });
            }
            return result;
        } catch (error) {
            return Array(3).fill({ date: "--/--", weather: "エラー", min: "--", max: "--", pop: "--%" });
        }
    }

    // 🕒 クリックされた店舗の時間帯天気を取得してポップアップを開く
    async function showHourlyWeather(index) {
        const store = stores[index];
        document.getElementById('modalTitle').innerText = `🕒 ${store.name.replace('PET THREE ', '')} (今日の時間帯予報)`;
        const tableBody = document.getElementById('hourlyTableBody');
        tableBody.innerHTML = `<tr><td colspan="4">時間帯予報を読み込み中...</td></tr>`;
        document.getElementById('hourlyModal').style.display = 'flex';

        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${store.lat}&longitude=${store.lon}&hourly=weathercode,temperature_2m,precipitation_probability&timezone=Asia%2FTokyo`;
            const response = await fetch(url);
            const data = await response.json();
            
            let html = "";
            // 今日(最初の24時間)から、営業時間を意識して「6時〜21時」の間を3時間おきにピックアップ
            const targetHours = [6, 9, 12, 15, 18, 21];
            
            targetHours.forEach(hour => {
                const timeStr = `${hour}:00`;
                const weather = getWeatherText(data.hourly.weathercode[hour]);
                const temp = Math.round(data.hourly.temperature_2m[hour]) + "℃";
                const pop = data.hourly.precipitation_probability[hour] + "%";
                
                html += `
                    <tr>
                        <td><strong>${timeStr}</strong></td>
                        <td>${weather}</td>
                        <td>${temp}</td>
                        <td>${pop}</td>
                    </tr>
                `;
            });
            tableBody.innerHTML = html;
        } catch (e) {
            tableBody.innerHTML = `<tr><td colspan="4">データの取得に失敗しました。</td></tr>`;
        }
    }

    function closeModal() {
        document.getElementById('hourlyModal').style.display = 'none';
    }

    async function fetchAllWeather() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = `<tr><td colspan="4" class="loading">データを取得中...</td></tr>`;
        let htmlBuffer = "";

        for (let i = 0; i < stores.length; i++) {
            const store = stores[i];
            const forecast3Days = await fetch3DayWeather(store.lat, store.lon);
            htmlBuffer += `<tr>`;
            htmlBuffer += `
                <td class="store-info">
                    <div class="store-click-zone" onclick="showHourlyWeather(${i})">
                        <div class="store-title">📍 ${store.name.replace('PET THREE ', '')}</div>
                    </div>
                    <div><span class="badge">${store.region}</span></div>
                </td>
            `;
            
            forecast3Days.forEach(day => {
                const isRain = day.weather.includes("雨") || day.weather.includes("雷") ? "is-rain" : "";
                htmlBuffer += `
                    <td class="day-column">
                        <div class="weather-card ${isRain}">
                            <div class="date-label">${day.date}</div>
                            <div class="weather-text">${day.weather}</div>
                            <div class="weather-details">
                                <span>降水:${day.pop}</span>
                                <span><span class="temp-high">${day.max}</span>/<span class="temp-low">${day.min}</span></span>
                            </div>
                        </div>
                    </td>
                `;
            });
            htmlBuffer += `</tr>`;
        }
        tableBody.innerHTML = htmlBuffer;
    }

    function filterTable() {
        const input = document.getElementById('searchInput');
        const filter = input.value.toLowerCase();
        const table = document.getElementById('weatherTable');
        const tr = table.getElementsByTagName('tr');

        for (let i = 1; i < tr.length; i++) {
            let tdName = tr[i].getElementsByTagName('td')[0];
            if (tdName) {
                let nameValue = tdName.textContent || tdName.innerText;
                tr[i].style.display = nameValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
            }
        }
    }

    window.onload = fetchAllWeather;
</script>
</body>
</html>
